services:
  - type: keyvalue
    name: learnloop-redis
    region: singapore
    plan: free
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

  - type: web
    name: learnloop-api
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm install && npm --workspace backend run build
    startCommand: npm --workspace backend run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: learnloop-redis
          property: connectionString
      - key: CLIENT_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: LearnLoop <no-reply@learnloop.local>
      - key: ESEWA_ENV
        value: test
      - key: ESEWA_PRODUCT_CODE
        value: EPAYTEST
      - key: ESEWA_SECRET_KEY
        sync: false
      - key: ESEWA_SUCCESS_URL
        sync: false
      - key: ESEWA_FAILURE_URL
        sync: false
